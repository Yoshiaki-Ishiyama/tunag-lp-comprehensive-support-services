<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Initiative placeholder image">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4578d8"/>
      <stop offset="100%" stop-color="#2aaadd"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#ffffff" opacity="0.18"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#dots)"/>
  <g transform="translate(400 280)" fill="#ffffff">
    <rect x="-110" y="-50" width="220" height="100" rx="14" fill="#ffffff" opacity="0.16"/>
    <rect x="-86" y="-26" width="172" height="10" rx="5" fill="#ffffff" opacity="0.55"/>
    <rect x="-86" y="-6" width="120" height="8" rx="4" fill="#ffffff" opacity="0.4"/>
    <rect x="-86" y="12" width="150" height="8" rx="4" fill="#ffffff" opacity="0.4"/>
  </g>
  <text x="400" y="420" text-anchor="middle" font-family="Inter, 'Helvetica Neue', sans-serif" font-size="22" font-weight="600" fill="#ffffff" opacity="0.9" letter-spacing="2">Initiative Image</text>
  <text x="400" y="450" text-anchor="middle" font-family="Inter, 'Helvetica Neue', sans-serif" font-size="13" font-weight="400" fill="#ffffff" opacity="0.65" letter-spacing="3">PLACEHOLDER</text>
</svg>
